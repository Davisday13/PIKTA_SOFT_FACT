<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Punto de Venta Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; color: #334155; }
        .product-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid transparent; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .cart-item { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">
    <div id="root" class="flex-1 overflow-hidden"></div>

    <script type="text/babel">
        const { useState } = React;

        const categories = ['🍔 Combos', '🍟 Extras', '🥤 Bebidas'];
        const products = [
            { id: 1, name: 'Combo Clásico', price: 5.50, category: '🍔 Combos', emoji: '🍔' },
            { id: 2, name: 'Combo Doble', price: 7.50, category: '🍔 Combos', emoji: '🍔' },
            { id: 3, name: 'Combo Pollo', price: 6.00, category: '🍔 Combos', emoji: '🍗' },
            { id: 4, name: 'Papas fritas', price: 1.50, category: '🍟 Extras', emoji: '🍟' },
            { id: 5, name: 'Refresco', price: 1.00, category: '🥤 Bebidas', emoji: '🥤' },
        ];

        function POS() {
            const [cart, setCart] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState('🍔 Combos');
            const [processing, setProcessing] = useState(false);

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? {...item, qty: item.qty + 1} : item);
                    }
                    return [...prev, {...product, qty: 1}];
                });
            };

            const processOrder = async () => {
                if (cart.length === 0) return;
                setProcessing(true);
                
                const orderData = {
                    canal: 'CAJA',
                    cliente: 'Venta Mostrador',
                    items: cart,
                    total: cart.reduce((acc, i) => acc + (i.price * i.qty), 0)
                };

                try {
                    const res = await fetch('/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(orderData)
                    });
                    const data = await res.json();
                    alert(`✅ Pedido ${data.id} procesado con éxito. El inventario ha sido actualizado.`);
                    setCart([]);
                } catch (e) {
                    alert('❌ Error al procesar pedido');
                } finally {
                    setProcessing(false);
                }
            };

            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            return (
                <div className="flex h-full overflow-hidden">
                    <div className="flex-1 flex flex-col p-6 overflow-hidden">
                        <header className="flex justify-between items-center mb-6">
                            <h1 className="text-2xl font-black text-slate-800">🛒 POS <span className="text-blue-600">RealTime</span></h1>
                            <div className="flex gap-2">
                                {categories.map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setSelectedCategory(cat)}
                                        className={`px-4 py-2 rounded-xl font-bold ${selectedCategory === cat ? 'bg-blue-600 text-white' : 'bg-white border'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto">
                            {products.filter(p => p.category === selectedCategory).map(product => (
                                <div key={product.id} onClick={() => addToCart(product)} className="product-card bg-white p-6 rounded-3xl text-center shadow-sm">
                                    <div className="text-5xl mb-4">{product.emoji}</div>
                                    <h3 className="font-bold">{product.name}</h3>
                                    <span className="text-blue-600 font-black">${product.price.toFixed(2)}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="w-[400px] bg-white border-l p-6 flex flex-col shadow-2xl">
                        <h2 className="text-xl font-black mb-6">Orden Actual</h2>
                        <div className="flex-1 overflow-y-auto space-y-4">
                            {cart.map(item => (
                                <div key={item.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                                    <div>
                                        <div className="font-bold text-sm">{item.name}</div>
                                        <div className="text-xs text-slate-500">${item.price.toFixed(2)} x {item.qty}</div>
                                    </div>
                                    <span className="font-black">${(item.price * item.qty).toFixed(2)}</span>
                                </div>
                            ))}
                        </div>
                        <div className="pt-6 border-t mt-4 space-y-4">
                            <div className="flex justify-between text-2xl font-black">
                                <span>Total</span>
                                <span>${total.toFixed(2)}</span>
                            </div>
                            <button 
                                onClick={processOrder}
                                disabled={processing || cart.length === 0}
                                className={`w-full p-4 rounded-2xl font-black text-lg transition-all ${processing ? 'bg-slate-400' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-200'}`}
                            >
                                {processing ? 'PROCESANDO...' : 'CONFIRMAR Y PAGAR'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<POS />);
    </script>
</body>
</html>
