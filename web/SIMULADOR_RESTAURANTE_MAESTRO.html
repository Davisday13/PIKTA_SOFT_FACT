<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Maestro - Restaurante Automatizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; height: 100vh; overflow: hidden; }
        .grid-container { display: grid; grid-template-columns: 350px 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; height: calc(100vh - 80px); padding: 12px; }
        .panel { background: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { background: #334155; padding: 8px 16px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 8px; }
    </style>
</head>
<body>
    <header class="h-20 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-8">
        <div>
            <h1 class="text-2xl font-black text-white flex items-center gap-3">
                <span class="p-2 bg-blue-600 rounded-lg">🚀</span>
                SIMULADOR <span class="text-blue-500 text-sm font-bold bg-blue-500/10 px-2 py-1 rounded">MAESTRO v1.0</span>
            </h1>
        </div>
        <div class="flex gap-4">
            <div class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 flex items-center gap-3">
                <div class="status-dot"></div>
                <span class="text-xs font-bold text-slate-400">CORE n8n SIMULATOR</span>
            </div>
        </div>
    </header>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function WhatsAppSim({ onNewOrder }) {
            const [messages, setMessages] = useState([
                { from: 'bot', text: '¡Hola! 👋 Bienvenido a Restaurante XYZ. ¿Qué te gustaría ordenar?\n\n1. Combo Clásico ($5.50)\n2. Combo Doble ($7.50)\n3. Combo Pollo ($6.00)\n\nResponde con el número de tu elección.' }
            ]);
            const [input, setInput] = useState('');
            const scrollRef = useRef();

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                const userMsg = input.trim();
                setMessages(prev => [...prev, { from: 'user', text: userMsg }]);
                setInput('');

                // Lógica del Bot (Simulando n8n)
                setTimeout(() => {
                    const choice = parseInt(userMsg);
                    if (choice >= 1 && choice <= 3) {
                        const items = [
                            { 1: 'Combo Clásico', 2: 'Combo Doble', 3: 'Combo Pollo' }[choice]
                        ];
                        const prices = { 1: 5.50, 2: 7.50, 3: 6.00 };
                        
                        setMessages(prev => [...prev, { from: 'bot', text: `✅ ¡Perfecto! He recibido tu pedido de *${items[0]}*. \n\nTotal: *$${prices[choice].toFixed(2)}*\n\nTu pedido ya está en cocina. ¡Te avisaré cuando esté listo!` }]);
                        
                        onNewOrder({
                            id: 'WA-' + Math.floor(Math.random()*10000),
                            client: 'Davis (WA)',
                            canal: 'WHATSAPP',
                            items: [{ name: items[0], qty: 1 }],
                            total: prices[choice],
                            time: 0,
                            status: 'RECIBIDO'
                        });
                    } else {
                        setMessages(prev => [...prev, { from: 'bot', text: '❌ Opción no válida. Por favor elige 1, 2 o 3.' }]);
                    }
                }, 800);
            };

            return (
                <div className="flex flex-col h-full bg-[#0b141a]">
                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.from === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${m.from === 'user' ? 'bg-[#005c4b] text-white' : 'bg-[#202c33] text-white'}`}>
                                    {m.text.split('\n').map((line, j) => <p key={j}>{line}</p>)}
                                </div>
                            </div>
                        ))}
                        <div ref={scrollRef} />
                    </div>
                    <div className="p-3 bg-[#202c33] flex gap-2">
                        <input 
                            value={input}
                            onChange={e => setInput(e.target.value)}
                            onKeyPress={e => e.key === 'Enter' && handleSend()}
                            className="flex-1 bg-[#2a3942] border-none rounded-xl px-4 py-2 text-white outline-none"
                            placeholder="Escribe un mensaje..."
                        />
                        <button onClick={handleSend} className="bg-[#00a884] p-2 rounded-full">📩</button>
                    </div>
                </div>
            );
        }

        function KDSSim({ orders, setOrders }) {
            const formatTime = (sec) => {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const complete = (id) => setOrders(prev => prev.filter(o => o.id !== id));
            const start = (id) => setOrders(prev => prev.map(o => o.id === id ? {...o, status: 'PREPARANDO'} : o));

            return (
                <div className="grid grid-cols-2 gap-3 p-4 overflow-y-auto h-full content-start">
                    {orders.map(o => (
                        <div key={o.id} className={`p-3 rounded-xl border-2 ${o.status === 'RECIBIDO' ? 'border-blue-500/30 bg-blue-500/5' : 'border-green-500/30 bg-green-500/5'}`}>
                            <div className="flex justify-between items-start mb-2">
                                <span className="text-[10px] font-bold text-slate-400">{o.id}</span>
                                <span className="text-sm font-mono font-bold text-blue-400">{formatTime(o.time)}</span>
                            </div>
                            <div className="font-bold text-sm mb-2">{o.items[0].qty}x {o.items[0].name}</div>
                            {o.status === 'RECIBIDO' ? (
                                <button onClick={() => start(o.id)} className="w-full py-2 bg-blue-600 rounded-lg text-xs font-bold">EMPEZAR</button>
                            ) : (
                                <button onClick={() => complete(o.id)} className="w-full py-2 bg-green-600 rounded-lg text-xs font-bold">COMPLETAR</button>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        function POSSim({ onNewOrder }) {
            const items = [
                { name: 'Combo Clásico', price: 5.50, emoji: '🍔' },
                { name: 'Combo Doble', price: 7.50, emoji: '🥓' },
                { name: 'Combo Pollo', price: 6.00, emoji: '🍗' }
            ];
            return (
                <div className="p-4 grid grid-cols-1 gap-3">
                    {items.map((item, i) => (
                        <button 
                            key={i}
                            onClick={() => onNewOrder({
                                id: 'POS-' + Math.floor(Math.random()*1000),
                                client: 'Caja 1',
                                canal: 'CAJA',
                                items: [{ name: item.name, qty: 1 }],
                                total: item.price,
                                time: 0,
                                status: 'RECIBIDO'
                            })}
                            className="bg-slate-700 hover:bg-blue-600 p-4 rounded-xl flex items-center justify-between transition-all"
                        >
                            <span className="text-2xl">{item.emoji}</span>
                            <span className="font-bold">{item.name}</span>
                            <span className="bg-slate-900 px-2 py-1 rounded text-xs font-bold text-blue-400">${item.price.toFixed(2)}</span>
                        </button>
                    ))}
                </div>
            );
        }

        function AdminSim({ sales, stock }) {
            return (
                <div className="p-6 space-y-6">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-slate-900 p-4 rounded-2xl border border-slate-700">
                            <div className="text-xs text-slate-500 font-bold uppercase mb-1">Ventas Hoy</div>
                            <div className="text-2xl font-black text-green-400">${sales.toFixed(2)}</div>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-2xl border border-slate-700">
                            <div className="text-xs text-slate-500 font-bold uppercase mb-1">Pedidos</div>
                            <div className="text-2xl font-black text-blue-400">{Math.floor(sales / 6)}</div>
                        </div>
                    </div>
                    <div>
                        <div className="text-xs font-bold text-slate-500 uppercase mb-3">Estado Inventario</div>
                        <div className="space-y-2">
                            {stock.map((s, i) => (
                                <div key={i} className="flex items-center justify-between bg-slate-800/50 p-3 rounded-xl">
                                    <span className="text-sm font-medium">{s.item}</span>
                                    <div className="flex items-center gap-3">
                                        <div className="w-24 h-2 bg-slate-700 rounded-full overflow-hidden">
                                            <div className={`h-full ${s.pct < 30 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: s.pct + '%' }}></div>
                                        </div>
                                        <span className="text-[10px] font-bold text-slate-400">{s.pct}%</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [orders, setOrders] = useState([]);
            const [sales, setSales] = useState(0);
            const [stock, setStock] = useState([
                { item: 'Carne Molida', pct: 85 },
                { item: 'Pan Hamburguesa', pct: 40 },
                { item: 'Papas Crudas', pct: 92 },
                { item: 'Refrescos', pct: 25 }
            ]);

            useEffect(() => {
                const interval = setInterval(() => {
                    setOrders(prev => prev.map(o => ({...o, time: o.time + 1})));
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const addOrder = (order) => {
                setOrders(prev => [...prev, order]);
                setSales(prev => prev + order.total);
                setStock(prev => prev.map(s => ({...s, pct: Math.max(0, s.pct - 2)})));
            };

            return (
                <div className="grid-container">
                    <div className="panel flex flex-col">
                        <div className="panel-header">📱 WhatsApp Bot Simulator</div>
                        <WhatsAppSim onNewOrder={addOrder} />
                    </div>
                    
                    <div className="panel">
                        <div className="panel-header">👨‍🍳 Kitchen Display (KDS)</div>
                        <KDSSim orders={orders} setOrders={setOrders} />
                    </div>

                    <div className="panel">
                        <div className="panel-header">🛒 POS / Kiosco Screen</div>
                        <POSSim onNewOrder={addOrder} />
                    </div>

                    <div className="panel col-span-2">
                        <div className="panel-header">📊 Dashboard de Operaciones & Inventario</div>
                        <AdminSim sales={sales} stock={stock} />
                    </div>

                    <div className="panel flex flex-col bg-blue-900/10 border-blue-500/30">
                        <div className="panel-header bg-blue-500/20">🧠 Cerebro n8n Log</div>
                        <div className="p-4 space-y-2 overflow-y-auto font-mono text-[10px]">
                            {orders.map((o, i) => (
                                <div key={i} className="text-blue-300">
                                    [{(new Date()).toLocaleTimeString()}] RECEIVED order {o.id} via {o.canal}. 
                                    Distributing to KDS and Inventory...
                                </div>
                            ))}
                            {sales > 0 && <div className="text-green-300">[INFO] Database updated. Sales: ${sales.toFixed(2)}</div>}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
