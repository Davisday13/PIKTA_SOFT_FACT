<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS - Sistema de Cocina Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .order-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function KDS() {
            const [orders, setOrders] = useState([]);

            const fetchOrders = async () => {
                const res = await fetch('/api/orders');
                const data = await res.json();
                setOrders(data);
            };

            useEffect(() => {
                fetchOrders();
                const interval = setInterval(fetchOrders, 3000); // Polling every 3s for "real-time"
                return () => clearInterval(interval);
            }, []);

            const updateStatus = async (id, status) => {
                await fetch('/api/orders/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, status })
                });
                fetchOrders();
            };

            return (
                <div className="max-w-7xl mx-auto">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-bold">👨‍🍳 KDS <span className="text-blue-500 text-sm">LIVE</span></h1>
                        <div className="bg-slate-800 px-4 py-2 rounded-lg border">
                            Activos: <span className="font-bold text-xl">{orders.length}</span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {orders.map(order => (
                            <div key={order.id} className="order-card rounded-2xl border-2 border-slate-700 bg-slate-800/50 overflow-hidden flex flex-col">
                                <div className="p-4 bg-slate-700/50 flex justify-between items-center">
                                    <div>
                                        <h2 className="text-xl font-bold">#{order.id}</h2>
                                        <p className="text-xs text-slate-400 font-medium uppercase tracking-wider">{order.customer}</p>
                                        {order.phone && <p className="text-xs text-green-400 font-bold">📞 {order.phone}</p>}
                                    </div>
                                    <span className="text-xs bg-blue-600 px-2 py-1 rounded-full h-fit">{order.source || 'POS'}</span>
                                </div>
                                <div className="p-4 flex-1 space-y-2">
                                    {order.items.map((item, i) => (
                                        <div key={i} className="text-lg font-medium flex justify-between">
                                            <span>• {item.name}</span>
                                            <span className="text-blue-400">x{item.quantity}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 bg-slate-900/30 border-t border-slate-700">
                                    {order.status === 'RECIBIDO' ? (
                                        <button onClick={() => updateStatus(order.id, 'PREPARANDO')} className="w-full py-3 bg-blue-600 rounded-xl font-bold">EMPEZAR</button>
                                    ) : (
                                        <button onClick={() => updateStatus(order.id, 'COMPLETADO')} className="w-full py-3 bg-green-600 rounded-xl font-bold">LISTO / ENTREGAR</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KDS />);
    </script>
</body>
</html>
